# 改名字，对应nacos里的配置文件名
spring:
  application:
    name: gulimall-third-party
  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml # 指定配置文件为yaml/properties格式
        namespace: 43344fbb-451d-46d0-b5de-7316335fb5f7
        extension-configs:
          - data-id: oss.yml
            group: DEFAULT_GROUP
            refresh: true
#        namespace: 只能写命名空间的id