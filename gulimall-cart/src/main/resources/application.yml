server:
  port: 14000
  servlet:
    #配置session过期时间
    session:
      timeout: 30m

spring:
  application:
    name: gulimall-cart
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
  redis:
    host: 192.168.56.10
    port: 6379
  session:
    store-type: redis
  thymeleaf:
    cache: false


# 配置线程池
gulimall:
  thread:
    core-size: 20
    max-size: 200
    keep-alive-time: 10