server:
  port: 9000
spring:
  datasource:
    username: root
    password: root
    url: jdbc:mysql://192.168.56.10:3306/gulimall_oms?userUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.jdbc.Driver
  application:
    #注意修改服务名
    name: gulimall-order
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

  redis:
    host: 192.168.56.10
  session:
    store-type: redis
  thymeleaf:
    cache: false
  main:
    allow-circular-references: true


mybatis-plus:
  configuration:
    #数据库下划线和实体类驼峰统一
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
    banner: false
  #告诉mp，sql映射文件的位置，默认值classpath*:/mapper/**/*.xml。
  #  classpath表示只引用现在模块的类路径。lasspath*表示不止引用现在模块的类路径，还包括依赖jar包的类路径
  mapper-locations: classpath:/mapper/**/*.xml


gulimall:
  thread:
    core-size: 20
    max-size: 200
    keep-alive-time: 10
logging:
  level:
    com.atguigu.gulimall.order.feign.CartFeignService: DEBUG
